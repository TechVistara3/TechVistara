<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TECH VISTARA 3.0 — You're Invited</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#050810;--surface:#0d1220;--card:#111827;
  --accent:#00f5c4;--accent2:#ff6b35;--accent3:#7c3aed;
  --text:#e8eaf0;--muted:#6b7280;--border:rgba(0,245,196,0.15);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;overflow:hidden;display:flex;align-items:center;justify-content:center;min-height:100vh;}

/* GRID BG */
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,245,196,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,196,0.03) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0;}

/* ORBS */
.orb{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0;}
.orb1{width:600px;height:600px;background:rgba(0,245,196,0.07);top:-150px;right:-150px;animation:orbFloat1 8s ease-in-out infinite;}
.orb2{width:500px;height:500px;background:rgba(255,107,53,0.06);bottom:-100px;left:-100px;animation:orbFloat2 10s ease-in-out infinite;}
.orb3{width:400px;height:400px;background:rgba(124,58,237,0.08);top:40%;left:35%;animation:orbFloat3 12s ease-in-out infinite;}

@keyframes orbFloat1{0%,100%{transform:translate(0,0);}50%{transform:translate(-30px,20px);}}
@keyframes orbFloat2{0%,100%{transform:translate(0,0);}50%{transform:translate(20px,-30px);}}
@keyframes orbFloat3{0%,100%{transform:translate(0,0);}50%{transform:translate(-20px,15px);}}

/* PARTICLES */
.particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.particle{position:absolute;width:2px;height:2px;background:var(--accent);border-radius:50%;opacity:0;animation:particleFall linear infinite;}
@keyframes particleFall{0%{opacity:0;transform:translateY(-10px);}10%{opacity:0.6;}90%{opacity:0.2;}100%{opacity:0;transform:translateY(100vh);}}

/* MAIN CONTENT */
.invite-wrap{position:relative;z-index:1;text-align:center;padding:24px;max-width:680px;width:100%;}

/* TOP TAG */
.invite-tag{display:inline-flex;align-items:center;gap:8px;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:3px;color:var(--accent);border:1px solid var(--border);background:rgba(0,245,196,0.05);padding:8px 20px;border-radius:100px;margin-bottom:28px;opacity:0;animation:fadeUp 0.7s ease 0.2s forwards;}
.tag-dot{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:blink 1.5s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.2;};}

/* INVITATION TEXT */
.invite-label{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:4px;color:var(--muted);margin-bottom:16px;opacity:0;animation:fadeUp 0.7s ease 0.4s forwards;}

/* MAIN TITLE */
.main-title{font-family:'Bebas Neue',sans-serif;line-height:0.88;letter-spacing:3px;margin-bottom:8px;opacity:0;animation:fadeUp 0.8s ease 0.5s forwards;}
.main-title .t1{display:block;font-size:clamp(80px,15vw,160px);color:var(--text);}
.main-title .t2{display:block;font-size:clamp(80px,15vw,160px);background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:fadeUp 0.8s ease 0.5s forwards, shimmer 4s linear 1.5s infinite;}
@keyframes shimmer{0%{background-position:0% center;}100%{background-position:200% center;}}
.main-title .t3{display:block;font-size:clamp(50px,9vw,100px);color:rgba(255,255,255,0.12);letter-spacing:8px;}

/* DIVIDER */
.invite-divider{display:flex;align-items:center;gap:16px;margin:24px auto;max-width:360px;opacity:0;animation:fadeUp 0.7s ease 0.7s forwards;}
.invite-divider::before,.invite-divider::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(0,245,196,0.3),transparent);}
.invite-divider-icon{font-size:18px;}

/* INFO CARDS */
.info-row{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-bottom:32px;opacity:0;animation:fadeUp 0.7s ease 0.9s forwards;}
.icard{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:14px 20px;text-align:center;min-width:120px;}
.icard-icon{font-size:20px;margin-bottom:6px;}
.icard-val{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;color:var(--text);}
.icard-lbl{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--muted);margin-top:3px;}
.icard.highlight{border-color:var(--border);background:rgba(0,245,196,0.05);}
.icard.highlight .icard-val{color:var(--accent);}

/* COLLEGE */
.college-tag{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:2px;color:var(--muted);margin-bottom:32px;opacity:0;animation:fadeUp 0.7s ease 1s forwards;}
.college-tag span{color:var(--text);}

/* CTA BUTTON */
.cta-wrap{opacity:0;animation:fadeUp 0.7s ease 1.1s forwards;}
.cta-btn{display:inline-flex;align-items:center;gap:12px;background:linear-gradient(135deg,var(--accent),#00c9a7);color:#000;border:none;border-radius:16px;padding:18px 48px;font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;cursor:pointer;transition:transform 0.3s ease,box-shadow 0.3s ease;text-decoration:none;position:relative;overflow:hidden;}
.cta-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.2),transparent);opacity:0;transition:opacity 0.3s;}
.cta-btn:hover{transform:translateY(-4px);box-shadow:0 16px 48px rgba(0,245,196,0.4);}
.cta-btn:hover::before{opacity:1;}
.cta-btn:active{transform:translateY(-2px);}
.cta-arrow{font-size:20px;transition:transform 0.3s;}
.cta-btn:hover .cta-arrow{transform:translateX(4px);}

.cta-sub{margin-top:12px;font-size:12px;color:var(--muted);font-family:'Space Mono',monospace;letter-spacing:1px;}

@keyframes fadeUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}

/* MOBILE */
@media(max-width:500px){
  body{overflow-y:auto;align-items:flex-start;padding:20px 0 40px;}
  .main-title .t1,.main-title .t2{font-size:clamp(64px,18vw,100px);}
  .main-title .t3{font-size:clamp(36px,10vw,60px);}
  .info-row{gap:8px;}
  .icard{padding:12px 14px;min-width:100px;}
  .cta-btn{padding:16px 36px;font-size:19px;}
}
</style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>
<div class="particles" id="particles"></div>

<div class="invite-wrap">

  <div class="invite-tag">
    <div class="tag-dot"></div>
    BCA DEPARTMENT &nbsp;&middot;&nbsp; SMD COLLEGE
  </div>

  <div class="invite-label">YOU ARE INVITED TO</div>

  <h1 class="main-title">
    <span class="t1">TECH</span>
    <span class="t2">VISTARA</span>
    <span class="t3">3.0</span>
  </h1>

  <div class="invite-divider">
    <div class="invite-divider-icon">&#x26A1;</div>
  </div>

  <div class="info-row">
    <div class="icard highlight">
      <div class="icard-icon">&#x1F4C5;</div>
      <div class="icard-val">28 MARCH</div>
      <div class="icard-lbl">2026</div>
    </div>
    <div class="icard">
      <div class="icard-icon">&#x1F3DB;&#xFE0F;</div>
      <div class="icard-val">SEMINAR HALL</div>
      <div class="icard-lbl">VENUE</div>
    </div>
    <div class="icard">
      <div class="icard-icon">&#x1F3C6;</div>
      <div class="icard-val">4 ROUNDS</div>
      <div class="icard-lbl">CHALLENGES</div>
    </div>
    <div class="icard highlight">
      <div class="icard-icon">&#x1F4B0;</div>
      <div class="icard-val">&#8377;200</div>
      <div class="icard-lbl">PER TEAM</div>
    </div>
  </div>

  <div class="college-tag">SMD COLLEGE &nbsp;&middot;&nbsp; <span>Annual Tech Fest</span></div>

  <div class="cta-wrap">
    <a class="cta-btn" href="register.html">
      REGISTER NOW <span class="cta-arrow">&#8594;</span>
    </a>
    <div class="cta-sub">4 members per team &middot; Limited slots</div>
  </div>

</div>

<script>
// Generate floating particles
var pc = document.getElementById('particles');
for(var i=0;i<30;i++){
  var p=document.createElement('div');
  p.className='particle';
  p.style.left=Math.random()*100+'%';
  p.style.animationDuration=(8+Math.random()*12)+'s';
  p.style.animationDelay=(Math.random()*10)+'s';
  p.style.width=p.style.height=(1+Math.random()*2)+'px';
  p.style.opacity=Math.random()*0.5;
  pc.appendChild(p);
}
</script>
</body>
</html>
